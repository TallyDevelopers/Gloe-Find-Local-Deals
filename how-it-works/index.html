<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gloē — How It Works & Source of Truth</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --pearl:#FAF5F2; --pearl-2:#F3EBE6; --white:#FFFFFF;
    --gold:#C89A8C; --gold-deep:#B8806F; --gold-700:#9A6757;
    --blush:#E8B4AB; --blush-50:#FCF2F1;
    --ink:#2B2019; --ink-2:#5E5147; --ink-3:#8C7F73;
    --line:rgba(43,32,25,.10); --line-soft:rgba(43,32,25,.06);
    --ok:#5b8c6e; --warn:#b8806f; --gap:#b5564f;
    --serif:'Fraunces',Georgia,serif; --sans:'Outfit',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
    --shadow:0 1px 2px rgba(43,32,25,.04),0 12px 40px -12px rgba(43,32,25,.14);
    --shadow-lg:0 2px 4px rgba(43,32,25,.05),0 30px 70px -20px rgba(43,32,25,.22);
    --sidebar:300px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--body); color:var(--ink); line-height:1.7;
    background:
      radial-gradient(1200px 600px at 85% -5%, #FBEFE9 0%, transparent 55%),
      radial-gradient(900px 500px at -10% 10%, #F7E9F0 0%, transparent 50%),
      var(--pearl);
    background-attachment:fixed; -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--blush);color:var(--ink)}

  /* ───── Top bar with tabs ───── */
  .topbar{
    position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:18px;
    padding:14px 28px;background:rgba(250,245,242,.82);backdrop-filter:blur(18px);
    border-bottom:1px solid var(--line);
  }
  .tb-brand{display:flex;align-items:center;gap:11px;margin-right:6px}
  .tb-mark{width:34px;height:34px;border-radius:11px;flex:0 0 34px;background:linear-gradient(140deg,var(--gold),var(--gold-deep));display:grid;place-items:center;color:#fff;font-family:var(--sans);font-weight:700;font-size:18px;box-shadow:0 5px 14px -4px rgba(184,128,111,.6)}
  .tb-name{font-family:var(--sans);font-weight:600;font-size:18px;letter-spacing:-.01em}
  .tabs{display:flex;gap:4px;background:var(--white);padding:4px;border-radius:13px;border:1px solid var(--line);box-shadow:var(--shadow)}
  .tab{
    font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--ink-2);
    padding:8px 18px;border-radius:9px;cursor:pointer;border:none;background:transparent;
    transition:all .2s ease;display:flex;align-items:center;gap:8px;white-space:nowrap;
  }
  .tab .tdot{width:6px;height:6px;border-radius:99px;background:var(--ink-3);opacity:.4}
  .tab.active{background:linear-gradient(140deg,var(--gold),var(--gold-deep));color:#fff;box-shadow:0 6px 16px -5px rgba(184,128,111,.6)}
  .tab.active .tdot{background:#fff;opacity:.9}
  .tab-meta{margin-left:auto;font-size:12px;color:var(--ink-3);font-family:var(--sans);display:flex;align-items:center;gap:7px}
  .tab-meta .live{width:7px;height:7px;border-radius:99px;background:var(--ok);box-shadow:0 0 0 3px rgba(91,140,110,.2)}

  /* ───── Layout ───── */
  .shell{display:flex;max-width:1400px;margin:0 auto;align-items:flex-start}
  .sidebar{
    width:var(--sidebar);flex:0 0 var(--sidebar);position:sticky;top:63px;
    height:calc(100vh - 63px);overflow-y:auto;padding:30px 22px 40px 34px;
    display:flex;flex-direction:column;scrollbar-width:thin;
  }
  .sidebar::-webkit-scrollbar{width:5px}
  .sidebar::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
  .side-label{font-size:11px;color:var(--ink-3);letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-bottom:14px;font-family:var(--sans)}
  main{flex:1;min-width:0;padding:0 0 160px}
  .wrap{max-width:780px;margin:0 auto;padding:0 48px}

  nav{display:flex;flex-direction:column;gap:1px}
  nav a{display:flex;align-items:baseline;gap:11px;text-decoration:none;color:var(--ink-2);font-size:13.5px;padding:7px 12px;border-radius:9px;transition:all .16s ease;border:1px solid transparent;line-height:1.4}
  nav a .num{font-family:var(--sans);font-size:11px;color:var(--ink-3);min-width:22px;font-weight:600;font-variant-numeric:tabular-nums}
  nav a:hover{background:var(--white);color:var(--ink);border-color:var(--line-soft)}
  nav a.active{background:var(--white);color:var(--gold-700);border-color:var(--line);box-shadow:var(--shadow)}
  nav a.active .num{color:var(--gold)}
  .side-foot{margin-top:auto;padding-top:24px;font-size:11.5px;color:var(--ink-3);line-height:1.6}

  /* ───── Rendered markdown content ───── */
  .doc-intro{padding:54px 0 8px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-700);background:var(--white);padding:7px 15px;border-radius:99px;border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:22px}
  .eyebrow .dot{width:6px;height:6px;border-radius:99px;background:var(--gold);box-shadow:0 0 0 4px rgba(200,154,140,.22)}

  .md h1{font-family:var(--serif);font-weight:300;font-size:clamp(40px,5.2vw,64px);line-height:1.04;letter-spacing:-.02em;color:var(--ink);margin:6px 0 22px}
  .md h1 em{font-style:italic;color:var(--gold-deep)}
  .md h2{font-family:var(--serif);font-weight:400;font-size:clamp(28px,3.4vw,38px);letter-spacing:-.018em;line-height:1.12;color:var(--ink);margin:64px 0 6px;padding-top:18px;scroll-margin-top:80px;display:flex;align-items:baseline;gap:15px}
  .md h2 .h2num{font-family:var(--serif);font-size:14px;font-weight:500;color:#fff;background:linear-gradient(140deg,var(--gold),var(--gold-deep));min-width:34px;height:34px;border-radius:10px;display:inline-grid;place-items:center;box-shadow:0 6px 14px -4px rgba(184,128,111,.5);transform:translateY(2px);flex:0 0 34px;font-variant-numeric:tabular-nums}
  .md h3{font-family:var(--sans);font-weight:600;font-size:19px;letter-spacing:-.01em;color:var(--ink);margin:34px 0 10px;display:flex;align-items:center;gap:10px;scroll-margin-top:80px}
  .md h3::before{content:"";width:18px;height:2px;background:var(--gold);border-radius:2px;opacity:.7;flex:0 0 18px}
  .md h4{font-family:var(--sans);font-weight:600;font-size:15px;color:var(--gold-700);margin:24px 0 6px;letter-spacing:.01em}
  .md p{margin:13px 0;color:var(--ink-2);font-size:16px}
  .md p strong,.md li strong{color:var(--ink);font-weight:600}
  .md em{color:var(--gold-700);font-style:italic}
  .md a{color:var(--gold-deep);text-decoration:none;border-bottom:1px solid var(--blush)}
  .md a:hover{border-color:var(--gold-deep)}
  .md ul,.md ol{margin:14px 0;padding:0;display:flex;flex-direction:column;gap:10px;list-style:none}
  .md ul li{position:relative;padding-left:28px;color:var(--ink-2);font-size:15.5px}
  .md ul li::before{content:"";position:absolute;left:5px;top:11px;width:7px;height:7px;border-radius:99px;background:var(--gold);box-shadow:0 0 0 3px rgba(200,154,140,.18)}
  .md ol{counter-reset:s}
  .md ol li{position:relative;padding-left:42px;color:var(--ink-2);font-size:15.5px;counter-increment:s}
  .md ol li::before{content:counter(s);position:absolute;left:0;top:-2px;width:27px;height:27px;border-radius:9px;background:var(--white);border:1px solid var(--line);display:grid;place-items:center;font-family:var(--sans);font-weight:600;font-size:12.5px;color:var(--gold-700);box-shadow:var(--shadow)}
  .md code{font-family:var(--mono);font-size:.86em;background:var(--pearl-2);color:var(--gold-700);padding:2px 7px;border-radius:6px;border:1px solid var(--line-soft)}
  .md pre{background:#2B2019;color:#F0E8E2;padding:18px 20px;border-radius:14px;overflow-x:auto;margin:18px 0;box-shadow:var(--shadow);font-size:13px;line-height:1.6}
  .md pre code{background:none;color:inherit;border:none;padding:0;font-size:13px}
  .md blockquote{margin:22px 0;padding:16px 24px;border-left:3px solid var(--gold);background:linear-gradient(100deg,rgba(200,154,140,.08),transparent);border-radius:0 14px 14px 0;color:var(--ink)}
  .md blockquote p{margin:6px 0;font-size:15.5px}
  .md blockquote p:first-child{margin-top:0}.md blockquote p:last-child{margin-bottom:0}
  .md hr{border:none;height:1px;background:linear-gradient(90deg,var(--line),transparent);margin:8px 0}
  .md table{width:100%;border-collapse:separate;border-spacing:0;margin:20px 0;font-size:14.5px;background:var(--white);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  .md th{font-family:var(--sans);text-align:left;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);padding:12px 16px;background:var(--pearl-2);font-weight:600}
  .md td{padding:12px 16px;border-top:1px solid var(--line-soft);color:var(--ink-2);vertical-align:top}
  .md td strong{color:var(--ink)}
  /* the "Deeper:" italic lines become subtle cards */
  .md p.deeper{font-family:var(--sans);font-size:12.5px;color:var(--ink-3);padding:11px 16px;background:rgba(255,255,255,.55);border:1px dashed var(--line);border-radius:10px;margin:16px 0}
  .md p.deeper code{background:rgba(255,255,255,.6)}

  /* loading + error */
  .status{padding:80px 0;text-align:center;color:var(--ink-3);font-family:var(--sans)}
  .status.err{color:var(--gap)}
  .status .big{font-family:var(--serif);font-size:24px;color:var(--ink-2);margin-bottom:10px}

  /* progress + reveal */
  .progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--blush));z-index:99;width:0}
  .reveal{opacity:0;transform:translateY(16px);transition:opacity .6s cubic-bezier(.2,.7,.2,1),transform .6s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}

  .menu-btn{display:none}
  @media(max-width:980px){
    .sidebar{position:fixed;left:0;top:0;z-index:50;height:100vh;background:var(--pearl);box-shadow:var(--shadow-lg);transform:translateX(-105%);transition:transform .3s ease;border-right:1px solid var(--line);padding-top:24px}
    .sidebar.open{transform:none}
    .wrap{padding:0 24px}
    .menu-btn{display:grid;place-items:center;width:40px;height:40px;border-radius:11px;background:var(--white);border:1px solid var(--line);box-shadow:var(--shadow);cursor:pointer;font-size:18px;color:var(--ink);margin-right:2px}
    .tab-meta{display:none}
    .tb-name{display:none}
  }
</style>
</head>
<body>
<div class="progress" id="progress"></div>

<div class="topbar">
  <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
  <div class="tb-brand"><div class="tb-mark">G</div><div class="tb-name">Gloē</div></div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-doc="how"><span class="tdot"></span>The Tour</button>
    <button class="tab" data-doc="spec"><span class="tdot"></span>The Spec</button>
    <button class="tab" data-doc="web"><span class="tdot"></span>The Web</button>
  </div>
  <div class="tab-meta"><span class="live"></span><span id="metaText">founder-readable</span></div>
</div>

<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="side-label" id="sideLabel">On this page</div>
    <nav id="nav"></nav>
    <div class="side-foot">
      A living document.<br/>Updated every time we ship.<br/><br/>
      <span style="color:var(--gold-700);font-weight:600">Renders the repo markdown live — edit the .md, refresh here.</span>
    </div>
  </aside>

  <main>
    <div class="wrap">
      <div id="content"><div class="status"><div class="big">Loading…</div></div></div>
    </div>
  </main>
</div>

<script>
const DOCS = {
  how:  { file:'../HOW-IT-WORKS.md',   meta:'founder-readable', label:'The Tour' },
  spec: { file:'../GLOE.md',           meta:'engineering spec', label:'The Spec' },
  web:  { file:'../apps/web/WEB.md',   meta:'gloe.app build',   label:'The Web' },
};
const cache = {};
let current = 'how';

/* ---------- tiny, safe-ish markdown renderer ---------- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function inline(s){
  // code spans first (protect their contents)
  const codes=[];
  s=s.replace(/`([^`]+)`/g,(m,c)=>{codes.push(c);return `␀${codes.length-1}␀`});
  s=esc(s);
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[^*])\*([^*][^*]*?)\*/g,'$1<em>$2</em>'); // single *italic*
  s=s.replace(/~~([^~]+)~~/g,'<s>$1</s>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,(m,t,h)=>{
    const ext=/^https?:/.test(h);
    const href=ext?h:'#'; // internal .md anchors -> handled by our own nav; keep harmless
    return `<a href="${href}"${ext?' target="_blank" rel="noopener"':''}>${t}</a>`;
  });
  s=s.replace(/␀(\d+)␀/g,(m,i)=>`<code>${esc(codes[+i])}</code>`);
  return s;
}
function slugify(t){return t.toLowerCase().replace(/[`*_]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')}

function render(md){
  const lines=md.split('\n');
  let html='', i=0, toc=[];
  const flushList=(()=>{});
  while(i<lines.length){
    let line=lines[i];

    // fenced code
    if(/^```/.test(line)){
      const lang=line.slice(3).trim(); let buf=[]; i++;
      while(i<lines.length && !/^```/.test(lines[i])){buf.push(lines[i]);i++}
      i++; html+=`<pre><code>${esc(buf.join('\n'))}</code></pre>`; continue;
    }
    // hr
    if(/^---+\s*$/.test(line)){html+='<hr/>';i++;continue}
    // headings
    let h=line.match(/^(#{1,4})\s+(.*)$/);
    if(h){
      const lvl=h[1].length; let txt=h[2].trim();
      if(lvl===1){html+=`<h1>${inline(txt)}</h1>`;i++;continue}
      if(lvl===2){
        const numMatch=txt.match(/^(\d+[A-Za-z]?)\.\s+(.*)$/);
        const id=slugify(txt);
        if(numMatch){
          toc.push({id,num:numMatch[1],txt:numMatch[2]});
          html+=`<h2 id="${id}"><span class="h2num">${numMatch[1]}</span><span>${inline(numMatch[2])}</span></h2>`;
        }else{
          toc.push({id,num:'',txt});
          html+=`<h2 id="${id}">${inline(txt)}</h2>`;
        }
        i++;continue;
      }
      if(lvl===3){const id=slugify(txt);html+=`<h3 id="${id}">${inline(txt)}</h3>`;i++;continue}
      html+=`<h4>${inline(txt)}</h4>`;i++;continue;
    }
    // blockquote (consume consecutive >)
    if(/^>\s?/.test(line)){
      let buf=[];
      while(i<lines.length && /^>\s?/.test(lines[i])){buf.push(lines[i].replace(/^>\s?/,''));i++}
      html+=`<blockquote>${render_inlineBlock(buf)}</blockquote>`;continue;
    }
    // table
    if(/\|/.test(line) && i+1<lines.length && /^\s*\|?[\s:-]+\|[\s:|-]*$/.test(lines[i+1])){
      const head=line.split('|').map(c=>c.trim()).filter((c,idx,a)=>!(idx===0&&c==='')&&!(idx===a.length-1&&c===''));
      i+=2; let rows=[];
      while(i<lines.length && /\|/.test(lines[i]) && lines[i].trim()!==''){
        rows.push(lines[i].split('|').map(c=>c.trim()).filter((c,idx,a)=>!(idx===0&&c==='')&&!(idx===a.length-1&&c==='')));i++;
      }
      html+='<table><thead><tr>'+head.map(c=>`<th>${inline(c)}</th>`).join('')+'</tr></thead><tbody>'+
        rows.map(r=>'<tr>'+r.map(c=>`<td>${inline(c)}</td>`).join('')+'</tr>').join('')+'</tbody></table>';
      continue;
    }
    // unordered list
    if(/^\s*[-*]\s+/.test(line)){
      let buf=[];
      while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){buf.push(lines[i].replace(/^\s*[-*]\s+/,''));i++}
      html+='<ul>'+buf.map(b=>`<li>${inline(b)}</li>`).join('')+'</ul>';continue;
    }
    // ordered list
    if(/^\s*\d+\.\s+/.test(line)){
      let buf=[];
      while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){buf.push(lines[i].replace(/^\s*\d+\.\s+/,''));i++}
      html+='<ol>'+buf.map(b=>`<li>${inline(b)}</li>`).join('')+'</ol>';continue;
    }
    // blank
    if(line.trim()===''){i++;continue}
    // paragraph (gather until blank/structural)
    let buf=[line];i++;
    while(i<lines.length && lines[i].trim()!=='' && !/^(#{1,4}\s|>|\s*[-*]\s|\s*\d+\.\s|```|---)/.test(lines[i]) && !/\|/.test(lines[i])){
      buf.push(lines[i]);i++;
    }
    const txt=buf.join(' ');
    const cls=/^\*Deeper:/.test(txt)?' class="deeper"':'';
    html+=`<p${cls}>${inline(txt)}</p>`;
  }
  return {html, toc};
}
function render_inlineBlock(arr){
  // mini-render for blockquote contents: paragraphs + lists
  return render(arr.join('\n')).html;
}

/* ---------- load + mount ---------- */
async function load(doc){
  current=doc;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.doc===doc));
  document.getElementById('metaText').textContent=DOCS[doc].meta;
  document.getElementById('sideLabel').textContent = doc==='how'?'On this page':'Source of truth';
  const content=document.getElementById('content');

  let md=cache[doc];
  if(md===undefined){
    content.innerHTML='<div class="status"><div class="big">Loading…</div></div>';
    try{
      const res=await fetch(DOCS[doc].file,{cache:'no-store'});
      if(!res.ok) throw new Error(res.status);
      md=await res.text(); cache[doc]=md;
    }catch(e){
      content.innerHTML=`<div class="status err"><div class="big">Couldn't load ${DOCS[doc].label}</div>`+
        `Open this page over a local server (file:// blocks fetch). Run <code>cd how-it-works &amp;&amp; python3 -m http.server</code> then visit localhost.</div>`;
      document.getElementById('nav').innerHTML='';
      return;
    }
  }
  const {html,toc}=render(md);
  content.innerHTML=`<div class="md reveal in">${html}</div>`;

  // build sidebar
  const nav=document.getElementById('nav');
  nav.innerHTML=toc.map(t=>`<a href="#${t.id}" data-id="${t.id}"><span class="num">${t.num||'·'}</span><span>${escapeHtml(t.txt)}</span></a>`).join('');
  nav.querySelectorAll('a').forEach(a=>a.addEventListener('click',e=>{
    e.preventDefault();
    document.getElementById(a.dataset.id)?.scrollIntoView({behavior:'smooth',block:'start'});
    document.getElementById('sidebar').classList.remove('open');
  }));
  // reveal sections
  document.querySelectorAll('.md h2').forEach(h=>{h.classList.add('reveal');revObs.observe(h)});
  window.scrollTo({top:0});
  setTimeout(onScroll,50);
}
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

const revObs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');revObs.unobserve(e.target)}}),{threshold:.04,rootMargin:'0px 0px -6% 0px'});

/* scroll: progress + active nav */
const progress=document.getElementById('progress');
function onScroll(){
  const st=window.scrollY,h=document.body.scrollHeight-window.innerHeight;
  progress.style.width=(h>0?st/h*100:0)+'%';
  const heads=[...document.querySelectorAll('.md h2[id]')];
  let cur=heads[0]?.id;
  for(const hd of heads){if(hd.getBoundingClientRect().top<=120)cur=hd.id}
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.id===cur));
}
window.addEventListener('scroll',onScroll,{passive:true});

/* tabs */
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{if(t.dataset.doc!==current)load(t.dataset.doc)}));
/* mobile menu */
const sb=document.getElementById('sidebar');
document.getElementById('menuBtn').addEventListener('click',()=>sb.classList.toggle('open'));

load('how');
</script>
</body>
</html>
